name: Deploy Fullstack App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t xabhi/ugc-backend:latest ./Backend
          docker push xabhi/ugc-backend:latest

      # 🔥 FIXED: Build & Push Frontend (IMPORTANT CHANGE)
      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
            -t xabhi/ugc-frontend:latest ./Frontend
          docker push xabhi/ugc-frontend:latest

      # ✅ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull xabhi/ugc-backend:latest
            docker pull xabhi/ugc-frontend:latest

            docker stop backend || true
            docker rm backend || true

            docker stop frontend || true
            docker rm frontend || true

            docker run -d \
              --name backend \
              -p 5000:5000 \
              --env-file .env \
              xabhi/ugc-backend:latest

            docker run -d \
              --name frontend \
              -p 5173:5173 \
              xabhi/ugc-frontend:latest